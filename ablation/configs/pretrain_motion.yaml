app: vjepa_2_1
nodes: 8
tasks_per_node: 8
cpus_per_task: 8
mem_per_gpu: 220G
folder: /your_folder/pretrain_2_1/16.8.vitb.256px.16f.motion
data:
  dataset_type: VideoDataset
  datasets:
  - /your_data/k710_train_paths.csv
  datasets_weights:
  - 1.0
  batch_size: 48
  crop_size: 256
  patch_size: 16
  dataset_fpcs:
  - 16
  tubelet_size: 2
  fps: 4
  num_workers: 8
  persistent_workers: true
  pin_mem: true

# ==============================================================================
# Option 2: Motion-Guided Masking Configuration
# ==============================================================================
# This configuration demonstrates the use of MotionMaskGenerator.
# You can configure custom motion parameters for each mask sequence block.
# Available motion_mode settings:
#   - 'random': Default random multi-block masking.
#   - 'motion_context': Token sorting: preserves high-motion areas as context.
#   - 'motion_target': Token sorting: targets high-motion areas for prediction.
#   - 'block_motion_context': Block sampling: biases predictor target blocks 
#                             towards low-motion regions.
#   - 'block_motion_target': Block sampling: biases predictor target blocks 
#                            towards high-motion regions.
# ==============================================================================

mask:
- aspect_ratio:
  - 0.75
  - 1.5
  full_complement: false
  max_keep: null
  max_temporal_keep: 1.0
  num_blocks: 8
  spatial_scale:
  - 0.15
  - 0.15
  temporal_scale:
  - 1.0
  - 1.0
  
  # Custom Motion Settings (Option 2 Ablations)
  motion_mode: block_motion_target
  motion_temperature: 0.05
  motion_keep_ratio: 0.25
  motion_pred_ratio: 0.75
